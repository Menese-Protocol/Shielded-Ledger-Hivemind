[package]
name = "gen"
version = "0.1.0"
edition = "2021"
# `cargo run -p gen` must keep meaning the vector generator (the security gate's step-2
# invocation) even though the package also ships the `circuit_oracle` helper binary.
default-run = "gen"

[dependencies]
common = { path = "../common" }
ark-ff = { workspace = true }
ark-ec = { workspace = true }
ark-bn254 = { workspace = true }
ark-bls12-381 = { workspace = true, optional = true }
ark-groth16 = { workspace = true }
ark-relations = { workspace = true }
ark-snark = { workspace = true }
ark-serialize = { workspace = true }
ark-std = { workspace = true }
hex = { workspace = true }
bulletproofs = { workspace = true }
curve25519-dalek-ng = { workspace = true }
merlin = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }

[features]
bls12-381 = ["common/bls12-381", "dep:ark-bls12-381"]
